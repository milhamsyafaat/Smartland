<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMARTLAND — Kelola User</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="grain"></div>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">SMARTLAND Admin</a>
    <div class="navbar-links">
      <a href="index.html" class="navbar-link" data-page="admin">Admin</a>
      <a href="users.html" class="navbar-link active" data-page="users">Users</a>
      <a href="harga.html" class="navbar-link" data-page="harga">Harga</a>
      <a href="iklan.html" class="navbar-link" data-page="iklan">Iklan</a>
      <a href="pengukuran.html" class="navbar-link" data-page="pengukuran">Pengukuran</a>
    </div>
    <button id="btn-logout" class="btn-logout-nav">Logout</button>
    <button class="navbar-toggle" id="menu-toggle" aria-expanded="false" aria-label="Menu">
      <span class="hamb-line"></span>
      <span class="hamb-line"></span>
      <span class="hamb-line"></span>
    </button>
  </div>
</nav>

<div class="nav-overlay" id="nav-overlay">
  <a href="index.html" class="nav-overlay-link" data-page="admin">Admin</a>
  <a href="users.html" class="nav-overlay-link" data-page="users">Users</a>
  <a href="harga.html" class="nav-overlay-link" data-page="harga">Harga</a>
  <a href="iklan.html" class="nav-overlay-link" data-page="iklan">Iklan</a>
  <a href="pengukuran.html" class="nav-overlay-link" data-page="pengukuran">Pengukuran</a>
  <a href="#" id="btn-logout-overlay" class="nav-overlay-link" style="color:var(--accent);">Logout</a>
</div>

<main class="container-wide" style="padding-top: 6rem; padding-bottom: 4rem;">

  <section class="mb-8">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <h2 style="color: var(--text);">Kelola User</h2>
        <p class="mt-2" style="color: var(--text-secondary);">Atur akun pengguna dan status premium</p>
      </div>
    </div>
  </section>

  <section>
    <div class="dobel">
      <div class="dobel-core" style="padding: 0;">
        <div class="table-wrapper" style="border: none;">
          <table class="table">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Username</th>
                <th>Premium</th>
                <th>Bergabung</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

</main>

<footer class="footer">
  <div class="container-wide">
    <div class="flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <span class="font-mono" style="font-size:0.75rem;color:var(--text-tertiary);">SMARTLAND Admin</span>
      </div>
      <span class="font-mono" style="font-size:0.75rem;color:var(--text-tertiary);">&copy; 2026 SMARTLAND</span>
    </div>
  </div>
</footer>

<script>
  if (localStorage.getItem('smartland_admin') !== 'true') { window.location.href = 'login.html'; }

  function loadUsers() {
    var users = JSON.parse(localStorage.getItem('smartland_users') || '[]');
    var tbody = document.getElementById('users-body');
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8" style="color:var(--text-secondary);">Belum ada user terdaftar</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(function(u, i) {
      var premium = u.premium ? 'Ya' : 'Tidak';
      var premiumBadge = u.premium
        ? '<span style="background:var(--accent);color:#fff;font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:9999px;font-weight:600;">PREMIUM</span>'
        : '<span style="color:var(--text-tertiary);font-size:0.75rem;">-</span>';
      var tgl = u.createdAt ? new Date(u.createdAt).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) : '-';
      return '<tr>' +
        '<td>' + (i + 1) + '</td>' +
        '<td>' + (u.nama || '-') + '</td>' +
        '<td>' + (u.username || '-') + '</td>' +
        '<td>' + premiumBadge + '</td>' +
        '<td style="font-size:0.8rem;">' + tgl + '</td>' +
        '<td>' +
          '<button onclick="togglePremium(' + u.id + ')" class="btn" style="background:var(--accent);color:#fff;padding:0.25rem 0.75rem;font-size:0.7rem;border-radius:9999px;border:none;">' +
            (u.premium ? 'Nonaktifkan Premium' : 'Aktifkan Premium') +
          '</button>' +
        '</td>' +
        '</tr>';
    }).join('');
  }

  function togglePremium(id) {
    var users = JSON.parse(localStorage.getItem('smartland_users') || '[]');
    var idx = users.findIndex(function(u) { return u.id === id; });
    if (idx === -1) return;
    users[idx].premium = !users[idx].premium;
    localStorage.setItem('smartland_users', JSON.stringify(users));
    loadUsers();
  }

  function handleLogout() {
    localStorage.removeItem('smartland_admin');
    window.location.href = 'login.html';
  }

  document.getElementById('btn-logout').addEventListener('click', handleLogout);
  document.getElementById('btn-logout-overlay').addEventListener('click', function(e) {
    e.preventDefault();
    handleLogout();
  });

  loadUsers();
</script>
<script src="../js/script.js"></script>
</body>
</html>
