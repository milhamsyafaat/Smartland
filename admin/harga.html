<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Referensi Harga Tanah — SMARTLAND Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .btn-table {
      transition: all 0.2s;
      font-family: var(--font-body);
      cursor: pointer;
      border: none;
      font-weight: 500;
    }
    .btn-table:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="grain"></div>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand">SMARTLAND Admin</a>
    <div class="navbar-links">
      <a href="index.html" class="navbar-link" data-page="admin">Admin</a>
      <a href="users.html" class="navbar-link" data-page="users">Users</a>
      <a href="harga.html" class="navbar-link active" data-page="harga">Harga</a>
      <a href="iklan.html" class="navbar-link" data-page="iklan">Iklan</a>
      <a href="pengukuran.html" class="navbar-link" data-page="pengukuran">Pengukuran</a>
      <a href="login.html" class="navbar-link" onclick="localStorage.removeItem('smartland_admin');" style="color:var(--accent);">Logout</a>
    </div>
    <button id="menu-toggle" class="navbar-toggle" aria-expanded="false" aria-label="Toggle menu">
      <span class="hamb-line"></span>
      <span class="hamb-line"></span>
      <span class="hamb-line"></span>
    </button>
  </div>
</nav>

<div id="nav-overlay" class="nav-overlay">
  <a href="index.html" class="nav-overlay-link" data-page="admin">Admin</a>
  <a href="users.html" class="nav-overlay-link" data-page="users">Users</a>
  <a href="harga.html" class="nav-overlay-link active" data-page="harga">Harga</a>
  <a href="iklan.html" class="nav-overlay-link" data-page="iklan">Iklan</a>
  <a href="pengukuran.html" class="nav-overlay-link" data-page="pengukuran">Pengukuran</a>
  <a href="login.html" class="nav-overlay-link" onclick="localStorage.removeItem('smartland_admin');">Logout</a>
</div>

<main class="section" style="padding-top:8rem;">
  <div class="section-inner" style="max-width:1100px;">

    <div class="section-header mb-12">
      <h1>Referensi Harga Tanah</h1>
      <p>Kelola data harga tanah per meter persegi berdasarkan lokasi.</p>
    </div>

    <div class="dobel mb-10">
      <div class="dobel-core">
        <h3 style="margin-bottom:1.5rem;font-size:1.25rem;">Tambah / Edit Data Harga</h3>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 items-end">
          <div>
            <label for="input-lokasi" class="form-label">Nama Lokasi</label>
            <input type="text" id="input-lokasi" placeholder="Contoh: Jakarta Selatan" class="form-input">
          </div>
          <div>
            <label for="input-harga" class="form-label">Harga per m&sup2;</label>
            <input type="number" id="input-harga" placeholder="Contoh: 1500000" class="form-input">
          </div>
          <div>
            <button id="btn-submit" class="btn btn-primary w-full justify-center">Tambah</button>
          </div>
        </div>
      </div>
    </div>

    <div class="dobel">
      <div class="dobel-core" style="padding:0;">
        <div class="table-wrapper" style="border:none;">
          <table class="table">
            <thead>
              <tr>
                <th style="width:4rem;">No</th>
                <th>Lokasi</th>
                <th>Harga / m&sup2;</th>
                <th style="width:12rem;">Aksi</th>
              </tr>
            </thead>
            <tbody id="harga-body">
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container-wide">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <p style="font-size:0.85rem;">&copy; 2026 SMARTLAND. All rights reserved.</p>
      <p style="font-size:0.75rem;color:var(--text-tertiary);">Admin Panel v2</p>
    </div>
  </div>
</footer>

<script>
  if (localStorage.getItem('smartland_admin') !== 'true') { window.location.href = 'login.html'; }

  function formatRupiah(angka) {
    return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(angka);
  }

  function loadData() {
    let version = localStorage.getItem('smartland_harga_ref_v');
    if (version !== '3') {
      localStorage.removeItem('smartland_harga_ref');
      localStorage.setItem('smartland_harga_ref_v', '3');
    }
    let data = JSON.parse(localStorage.getItem('smartland_harga_ref') || 'null');
    if (!data || data.length === 0) {
      data = [
        { id: 1, lokasi: 'Kebayoran Baru, Jakarta Selatan', harga: 35000000 },
        { id: 2, lokasi: 'Menteng, Jakarta Pusat', harga: 45000000 },
        { id: 3, lokasi: 'Kelapa Gading, Jakarta Utara', harga: 18000000 },
        { id: 4, lokasi: 'Pantai Indah Kapuk, Jakarta Utara', harga: 30000000 },
        { id: 5, lokasi: 'Pasar Minggu, Jakarta Selatan', harga: 12000000 },
        { id: 6, lokasi: 'BSD City, Tangerang Selatan', harga: 15000000 },
        { id: 7, lokasi: 'Alam Sutera, Tangerang', harga: 18000000 },
        { id: 8, lokasi: 'Dago, Bandung', harga: 12000000 },
        { id: 9, lokasi: 'Cihampelas, Bandung', harga: 9500000 },
        { id: 10, lokasi: 'Buah Batu, Bandung', harga: 7000000 },
        { id: 11, lokasi: 'Setiabudi, Bandung', harga: 15000000 },
        { id: 12, lokasi: 'Sukolilo, Surabaya', harga: 8500000 },
        { id: 13, lokasi: 'Wonokromo, Surabaya', harga: 6500000 },
        { id: 14, lokasi: 'Bukit Darmo, Surabaya', harga: 15000000 },
        { id: 15, lokasi: 'Tembalang, Semarang', harga: 5000000 },
        { id: 16, lokasi: 'Ngaliyan, Semarang', harga: 3500000 },
        { id: 17, lokasi: 'Seturan, Yogyakarta', harga: 8000000 },
        { id: 18, lokasi: 'Mlati, Sleman', harga: 6000000 },
        { id: 19, lokasi: 'Sukoharjo, Solo', harga: 3500000 },
        { id: 20, lokasi: 'Banjarsari, Solo', harga: 4500000 },
        { id: 21, lokasi: 'Gubug, Grobogan', harga: 500000 },
        { id: 22, lokasi: 'Senggigi, Lombok Barat', harga: 2500000 },
        { id: 23, lokasi: 'Sanur, Denpasar', harga: 20000000 },
        { id: 24, lokasi: 'Seminyak, Badung', harga: 35000000 },
        { id: 25, lokasi: 'Ubud, Gianyar', harga: 15000000 },
        { id: 26, lokasi: 'Tamalanrea, Makassar', harga: 5000000 },
        { id: 27, lokasi: 'Panakkukang, Makassar', harga: 8000000 },
        { id: 28, lokasi: 'Medan Baru, Medan', harga: 10000000 },
        { id: 29, lokasi: 'Polonia, Medan', harga: 15000000 },
        { id: 30, lokasi: 'Damai, Balikpapan', harga: 12000000 },
      ];
      localStorage.setItem('smartland_harga_ref', JSON.stringify(data));
    }

    const tbody = document.getElementById('harga-body');
    tbody.innerHTML = data.map((item, i) => `
      <tr>
        <td class="py-3">${i+1}</td>
        <td class="py-3">${item.lokasi}</td>
        <td class="py-3 font-mono">${formatRupiah(item.harga)}</td>
        <td class="py-3">
          <button onclick='editData(${item.id})' class="btn-table text-sm px-3 py-1.5 rounded-full ml-1" style="background:var(--accent);color:#F5EFE6;">Edit</button>
          <button onclick='hapusData(${item.id})' class="btn-table text-sm px-3 py-1.5 rounded-full ml-1" style="background:#ef4444;color:#fff;">Hapus</button>
        </td>
      </tr>
    `).join('');
  }

  let editId = null;

  function tambahData() {
    const lokasi = document.getElementById('input-lokasi').value.trim();
    const harga = parseInt(document.getElementById('input-harga').value);
    if (!lokasi || !harga) { alert('Lengkapi data!'); return; }

    let data = JSON.parse(localStorage.getItem('smartland_harga_ref') || '[]');

    if (editId) {
      const idx = data.findIndex(d => d.id === editId);
      if (idx >= 0) { data[idx] = { ...data[idx], lokasi, harga }; }
      editId = null;
      document.getElementById('btn-submit').textContent = 'Tambah';
    } else {
      data.push({ id: Date.now(), lokasi, harga });
    }

    localStorage.setItem('smartland_harga_ref', JSON.stringify(data));
    document.getElementById('input-lokasi').value = '';
    document.getElementById('input-harga').value = '';
    loadData();
  }

  function editData(id) {
    const data = JSON.parse(localStorage.getItem('smartland_harga_ref') || '[]');
    const item = data.find(d => d.id === id);
    if (!item) return;
    document.getElementById('input-lokasi').value = item.lokasi;
    document.getElementById('input-harga').value = item.harga;
    editId = id;
    document.getElementById('btn-submit').textContent = 'Simpan';
  }

  function hapusData(id) {
    showConfirm('Hapus data ini?', function (ok) {
      if (!ok) return;
      let data = JSON.parse(localStorage.getItem('smartland_harga_ref') || '[]');
      data = data.filter(d => d.id !== id);
      localStorage.setItem('smartland_harga_ref', JSON.stringify(data));
      loadData();
    });
  }

  document.getElementById('btn-submit').addEventListener('click', tambahData);

  loadData();
</script>

<script src="../js/script.js"></script>

</body>
</html>
