  <style>
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #map { width: 100%; height: 100vh; z-index: 1; }
    .leaflet-control-zoom a { background: var(--card) !important; color: var(--text) !important; border-color: var(--border) !important; }

    .reticle { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
    .reticle.active { opacity: 1; }
    .reticle-cross { width: 40px; height: 40px; position: relative; }
    .reticle-cross::before, .reticle-cross::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
    .reticle-cross::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    .reticle-cross::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
    .reticle-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border: 2px solid rgba(217,119,6,0.8); border-radius: 50%; }
    .reticle-data { position: fixed; top: 5rem; left: 1rem; z-index: 10; background: rgba(0,0,0,0.75); color: #0f0; padding: 0.5rem 0.75rem; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; line-height: 1.5; backdrop-filter: blur(4px); pointer-events: none; display: none; }
    .reticle.active ~ .reticle-data, .reticle-data.active { display: block; }

    .search-box { position: absolute; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 30; width: min(90%, 480px); }
    .search-box input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem; border: none; border-radius: 12px; background: var(--bg); color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-family: var(--font-body); font-size: 0.95rem; }
    .search-box input:focus { outline: 2px solid var(--primary); }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
    .search-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg); border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); max-height: 280px; overflow-y: auto; z-index: 30; }
    .search-results.hidden { display: none; }
    .search-result-item:hover { background: var(--bg-secondary); }

    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; background: var(--bg); border-radius: 20px 20px 0 0; box-shadow: 0 -4px 30px rgba(0,0,0,0.1); max-height: 55vh; overflow-y: auto; }
    .bottom-sheet-handle { width: 36px; height: 4px; background: var(--text-light); border-radius: 4px; margin: 0.75rem auto; cursor: grab; }
    .mode-toggle { display: flex; gap: 0.5rem; background: var(--bg-secondary); padding: 0.25rem; border-radius: 10px; }
    .mode-toggle .btn { flex: 1; padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 8px; border: none; }
    .mode-toggle .btn-primary { background: var(--primary); color: white; }
    .mode-toggle .btn-secondary { background: transparent; color: var(--text-secondary); }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-backdrop.hidden { display: none; }
    .modal-card { background: var(--bg); border-radius: 20px; padding: 2rem; max-width: 420px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }

    @media (min-width: 768px) {
      .bottom-sheet { max-height: 40vh; }
    }

    .map-mode-indicator { position: absolute; top: 5rem; right: 1rem; z-index: 15; padding: 0.4rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; background: rgba(0,0,0,0.7); color: white; backdrop-filter: blur(4px); display: flex; align-items: center; gap: 0.5rem; pointer-events: none; }
    .map-mode-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; }
    .map-mode-dot.measure { background: var(--accent); animation: pulse-dot 1.5s infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .leaflet-popup-tip { display: none !important; }
    .leaflet-popup-close-button { display: none !important; }
  </style>
</head>

<script src="js/app.js"></script>
<script>
  (function() {
    var modeLabel = document.getElementById('mode-label');
    var modeDot = document.getElementById('mode-dot');
    var areaPlaceholder = document.getElementById('area-placeholder');
    var areaResult = document.getElementById('area-result');
    var perimPlaceholder = document.getElementById('perimeter-placeholder');
    var perimResult = document.getElementById('perimeter-result');

    // Patch updateMeasurementInfo to handle placeholders
    var origUpdate = window.updateMeasurementInfo;
    if (origUpdate) {
      var patched = function() {
        origUpdate();
        if (APP_STATE && APP_STATE.measurementPoints) {
          var len = APP_STATE.measurementPoints.length;
          if (len < 3) {
            if (areaPlaceholder) areaPlaceholder.style.display = 'block';
            if (areaResult) areaResult.style.display = 'none';
            if (perimPlaceholder) perimPlaceholder.style.display = 'block';
            if (perimResult) perimResult.style.display = 'none';
          } else {
            if (areaPlaceholder) areaPlaceholder.style.display = 'none';
            if (perimPlaceholder) perimPlaceholder.style.display = 'none';
          }
        }
      };
      window.updateMeasurementInfo = patched;
    }

    // Mode indicator
    document.addEventListener('click', function(e) {
      if (e.target.closest('#mode-browse')) {
        modeLabel.textContent = 'Menjelajah';
        modeDot.className = 'map-mode-dot';
      }
      if (e.target.closest('#mode-measure')) {
        modeLabel.textContent = 'Mengukur';
        modeDot.className = 'map-mode-dot measure';
      }
    });

    // Show reticle data when measuring
    var reticleData = document.getElementById('reticle-data');
    document.addEventListener('click', function(e) {
      if (e.target.closest('#mode-measure')) {
        reticleData.classList.add('active');
      }
      if (e.target.closest('#mode-browse')) {
        reticleData.classList.remove('active');
      }
    });
  })();
</script>
